[colors]
background = #dd282a36
foreground = #f8f8f2
primary = #bd93f9
secondary = #8be9fd
alert = #ff5555
disabled = #6272a4

[bar/mibarra]
bottom = true
width = 96%
offset-x = 2%
offset-y = 1%
height = 30
radius = 12

; Fija la barra por encima de las ventanas
override-redirect = false 
wm-restack = i3

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2
border-size = 0
padding-left = 2
padding-right = 2
module-margin = 1

; Fuentes (necesitas Nerd Fonts instaladas)
font-0 = "FiraCode Nerd Font:size=10;2"
font-1 = "Symbols Nerd Font:size=12;2"

[module/rofi]
type = custom/text
content = "ůį£á "
content-foreground = ${colors.secondary}
click-left = ~/.config/rofi/launchers/type-7/launcher.sh


[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true
index-sort = true
format = <label-state> <label-mode>
label-focused = %name%
label-focused-background = #44475a
label-focused-underline= ${colors.primary}
label-focused-padding = 1
label-unfocused = %name%
label-unfocused-padding = 1
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

[module/screenshot]
type = custom/text
content = "ÔÄį "
content-foreground = ${colors.secondary}
# Al hacer clic, se abre la interfaz de recorte de flameshot
click-left = flameshot gui

[module/date]
type = internal/date
interval = 30
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label = ÔÄó %date%
label-foreground = ${colors.primary}

[module/cpu]
type = internal/cpu
; Intervalo en 3 para no gastar recursos del i3-5005U
interval = 3
format-prefix = "Ôčõ "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 3
format-prefix = "ÓŅÖ "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/bluetooth]
type = custom/text
content = "ÔäĒ"
content-foreground = ${colors.primary}
; Abre blueman para gestionar bluetooth visualmente
click-left = blueman-manager

[module/pulseaudio]
type = internal/pulseaudio

; Esto es clave para que no se dispare a n√ļmeros locos
use-ui-max = false
interval = 5

format-volume = <label-volume>
format-volume-prefix = "ÔÄ®  "
format-volume-prefix-foreground = ${colors.primary}

; Forzamos a que el label solo muestre hasta 3 d√≠gitos (m√°ximo 100)
label-volume = %percentage%%

label-muted = "ůįĚü Muted"
label-muted-foreground = ${colors.disabled}

click-right = pavucontrol
click-left = pactl set-sink-mute @DEFAULT_SINK@ toggle
[module/backlight]
type = internal/backlight
; Suele ser intel_backlight en ese modelo de Ideapad
card = intel_backlight
use-actual-brightness = true
format-prefix = "ÔÜÖ "
format-prefix-foreground = ${colors.primary}
label = %percentage%%

[module/wifi]
type = internal/network
interface-type = wireless
interval = 3
format-connected = <label-connected>
format-connected-prefix = "Ôáę "
format-connected-prefix-foreground = ${colors.primary}

; Aqu√≠ truncamos el nombre: m√≠nimo 1 caracter, m√°ximo 8, y a√Īade "..." si se pasa
label-connected = %essid:1:3:%

format-disconnected = <label-disconnected>
label-disconnected = ůįĖ™ Desc.
label-disconnected-foreground = ${colors.disabled}

[module/battery]
type = internal/battery
full-at = 99
low-at = 15
; Revisa si tu bater√≠a es BAT0 o BAT1 usando: ls /sys/class/power_supply/
battery = BAT0
adapter = AC
poll-interval = 5
format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
label-charging = %percentage%%
label-discharging = %percentage%%
label-full = ÔČÄ %percentage%%
ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ
ramp-capacity-foreground = ${colors.primary}
animation-charging-0 = ÔČĄ
animation-charging-1 = ÔČÉ
animation-charging-2 = ÔČā
animation-charging-3 = ÔČĀ
animation-charging-4 = ÔČÄ
animation-charging-foreground = ${colors.secondary}


