[window]
padding = {x = 5, y = 5}
dynamic_padding = true
decorations = "None"
opacity = 0.75
decorations_theme_variant = "Dark"

[font]
size = 12.5

[scrolling]
history = 100
multiplier = 3

[colors.primary]
foreground = "#F8F8F2"
background = "#282A36"

[cursor]
style = { shape = "Beam", blinking = "Always" }

[keyboard]
bindings = [
{ key = "N", mods = "Control", action = "CreateNewWindow" }
]
